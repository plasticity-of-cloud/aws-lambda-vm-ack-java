quarkus.application.name=microvm-auth-agent
quarkus.http.port=8090

# Operator token endpoint (in-cluster)
microvm.agent.operator-url=${OPERATOR_URL:https://kube-microvm-operator.kube-microvm.svc:443}
microvm.agent.vm-name=${MICROVM_NAME}
microvm.agent.namespace=${MICROVM_NAMESPACE:default}
microvm.agent.mount-path=${MOUNT_PATH:/var/run/microvm}
microvm.agent.expiry-minutes=${TOKEN_EXPIRY_MINUTES:30}
# ServiceAccount token for calling the operator API
microvm.agent.sa-token-path=/var/run/secrets/kubernetes.io/serviceaccount/token
