---
# Token requester ClusterRole — grants pods permission to call the operator's
# token sub-resource (POST .../microvms/{name}/token) without AWS credentials.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: microvm-token-requester
rules:
- apiGroups: ["lambda.aws.amazon.com"]
  resources: ["microvms/token"]
  verbs: ["create"]
---
# Operator token endpoint RBAC — allows the operator SA to perform
# TokenReview and SubjectAccessReview (needed for in-cluster token endpoint).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-microvm-operator-token-auth-role
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-microvm-operator-token-auth-binding
subjects:
- kind: ServiceAccount
  name: kube-microvm-operator
  namespace: kube-microvm
roleRef:
  kind: ClusterRole
  name: kube-microvm-operator-token-auth-role
  apiGroup: rbac.authorization.k8s.io
---
# Operator webhook RBAC — allows the operator SA to read namespaces,
# resourcequotas, and microvmclasses during admission validation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-microvm-operator-webhook-role
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["list"]
- apiGroups: ["lambda.aws.amazon.com"]
  resources: ["microvmclasses"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-microvm-operator-webhook-binding
subjects:
- kind: ServiceAccount
  name: kube-microvm-operator
  namespace: kube-microvm
roleRef:
  kind: ClusterRole
  name: kube-microvm-operator-webhook-role
  apiGroup: rbac.authorization.k8s.io
---
# cert-manager: SelfSigned Issuer (namespace-scoped, bootstraps the CA)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kube-microvm-operator-selfsigned
  namespace: kube-microvm
spec:
  selfSigned: {}
---
# cert-manager: CA Certificate (self-signed root)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kube-microvm-operator-ca
  namespace: kube-microvm
spec:
  isCA: true
  commonName: kube-microvm-operator-ca
  secretName: kube-microvm-operator-ca
  issuerRef:
    name: kube-microvm-operator-selfsigned
    kind: Issuer
  duration: 87600h
  renewBefore: 720h
---
# cert-manager: CA Issuer (signs leaf certs using the CA)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kube-microvm-operator-ca
  namespace: kube-microvm
spec:
  ca:
    secretName: kube-microvm-operator-ca
---
# cert-manager: Leaf Certificate for webhook TLS (issued by the CA)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kube-microvm-operator-webhook-tls
  namespace: kube-microvm
spec:
  secretName: kube-microvm-operator-webhook-tls
  dnsNames:
  - kube-microvm-operator.kube-microvm.svc
  - kube-microvm-operator.kube-microvm.svc.cluster.local
  issuerRef:
    name: kube-microvm-operator-ca
    kind: Issuer
  duration: 8760h
  renewBefore: 720h
---
# MutatingWebhookConfiguration — MicroVM spec defaulting + pod token injection
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kube-microvm-operator-mutating
  annotations:
    cert-manager.io/inject-ca-from: kube-microvm/kube-microvm-operator-webhook-tls
webhooks:
- name: mutate.microvms.lambda.aws.amazon.com
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore
  clientConfig:
    service:
      name: kube-microvm-operator
      namespace: kube-microvm
      path: /mutate-microvm
      port: 443
  rules:
  - apiGroups: ["lambda.aws.amazon.com"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["microvms"]
- name: pod-inject.lambda.aws.amazon.com
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore
  clientConfig:
    service:
      name: kube-microvm-operator
      namespace: kube-microvm
      path: /mutate-pod
      port: 443
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
  namespaceSelector:
    matchLabels:
      lambda.microvm.auth/inject: "enabled"
---
# ValidatingWebhookConfiguration — MicroVM/Image/Network validation
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kube-microvm-operator-validating
  annotations:
    cert-manager.io/inject-ca-from: kube-microvm/kube-microvm-operator-webhook-tls
webhooks:
- name: validate.microvms.lambda.aws.amazon.com
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: kube-microvm-operator
      namespace: kube-microvm
      path: /validate-microvm
      port: 443
  rules:
  - apiGroups: ["lambda.aws.amazon.com"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["microvms", "microvmimages", "microvmnetworks"]
