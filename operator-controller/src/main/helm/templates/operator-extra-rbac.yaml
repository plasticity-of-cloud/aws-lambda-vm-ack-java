---
# Operator token endpoint RBAC — allows the operator SA to perform
# TokenReview and SubjectAccessReview (needed for in-cluster token endpoint).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-microvm-operator-token-auth-role
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-microvm-operator-token-auth-binding
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: kube-microvm-operator
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: kube-microvm-operator-token-auth-role
  apiGroup: rbac.authorization.k8s.io
---
# Operator webhook RBAC — allows the operator SA to perform namespace permission
# checks, quota lookups, and MicroVMClass lookups during admission validation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-microvm-operator-webhook-role
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["list"]
- apiGroups: ["lambda.aws.amazon.com"]
  resources: ["microvmclasses"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-microvm-operator-webhook-binding
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: kube-microvm-operator
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: kube-microvm-operator-webhook-role
  apiGroup: rbac.authorization.k8s.io
