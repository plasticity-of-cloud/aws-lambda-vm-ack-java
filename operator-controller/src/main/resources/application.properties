# AWS Configuration
aws.region=${AWS_REGION:us-east-1}
aws.microvm.thread-pool-size=10

# Quarkus Operator SDK
quarkus.operator-sdk.start-operator=true

# Health
quarkus.smallrye-health.root-path=/q/health

# HTTP + TLS
quarkus.http.port=8080
quarkus.http.ssl-port=8443
# cert-manager injects TLS certs via volume mount
quarkus.http.ssl.certificate.files=/tls/tls.crt
quarkus.http.ssl.certificate.key-files=/tls/tls.key
# Dev/test: disable TLS (no cert-manager available)
%dev.quarkus.http.ssl.certificate.files=
%dev.quarkus.http.ssl.certificate.key-files=
%test.quarkus.http.ssl.certificate.files=
%test.quarkus.http.ssl.certificate.key-files=

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

# Container image
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=plasticity-of-cloud
quarkus.container-image.name=kube-microvm-operator
quarkus.container-image.tag=latest
quarkus.container-image.docker.dockerfile-native-path=src/main/docker/Dockerfile.native
quarkus.container-image.docker.dockerfile-jvm-path=src/main/docker/Dockerfile.jvm

# Kubernetes manifest generation
quarkus.kubernetes.name=kube-microvm-operator
quarkus.kubernetes.namespace=kube-microvm
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.replicas=1
quarkus.kubernetes.service-account=kube-microvm-operator
quarkus.kubernetes.liveness-probe.http-action-path=/q/health/live
quarkus.kubernetes.liveness-probe.initial-delay=5s
quarkus.kubernetes.readiness-probe.http-action-path=/q/health/ready
quarkus.kubernetes.readiness-probe.initial-delay=10s
quarkus.kubernetes.startup-probe.http-action-path=/q/health/started
quarkus.kubernetes.startup-probe.initial-delay=2s
quarkus.kubernetes.startup-probe.failure-threshold=6
quarkus.kubernetes.startup-probe.period=5s
quarkus.kubernetes.env.vars.AWS_REGION=us-east-1
quarkus.kubernetes.env.vars.QUARKUS_LOG_LEVEL=INFO
quarkus.kubernetes.resources.requests.cpu=100m
quarkus.kubernetes.resources.requests.memory=256Mi
quarkus.kubernetes.resources.limits.cpu=500m
quarkus.kubernetes.resources.limits.memory=512Mi
# TLS cert volume from cert-manager Secret
quarkus.kubernetes.secret-volumes."tls-certs".secret-name=kube-microvm-operator-webhook-tls
quarkus.kubernetes.secret-volumes."tls-certs".default-mode=0644
quarkus.kubernetes.mounts."tls-certs".path=/tls
quarkus.kubernetes.mounts."tls-certs".read-only=true

# Token endpoint config
microvm.token.max-expiry-minutes=60
microvm.webhook.agent-image=ghcr.io/plasticity-of-cloud/microvm-auth-agent:latest

# Helm chart generation (quarkus-helm)
quarkus.helm.name=kube-microvm-operator
quarkus.helm.description=Kubernetes operator for AWS Lambda MicroVMs following the ACK pattern
quarkus.helm.create-tar-file=true
quarkus.helm.notes=templates/NOTES.txt
quarkus.helm.values.replicas.paths=(kind == Deployment).spec.replicas
quarkus.helm.values.replicas.value-as-int=1
quarkus.micrometer.export.prometheus.path=/q/metrics
# Disable ServiceMonitor generation — requires Prometheus Operator CRD which is not a hard dependency
quarkus.kubernetes.prometheus.generate-service-monitor=false
