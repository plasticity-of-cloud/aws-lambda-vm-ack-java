name: Build and Release

on:
  push:
    branches: [ main, 'spec/**' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  MAVEN_OPTS: '-Xmx4g'

jobs:
  # ─── Tests ────────────────────────────────────────────────────────────────

  test-jvm:
    name: Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: ./mvnw verify -pl operator-core,operator-controller,operator-webhook,operator-cli,operator-tests -am --batch-mode --no-transfer-progress

  # ─── Native CLI binary ────────────────────────────────────────────────────

  native-cli:
    name: Native CLI (${{ matrix.arch }})
    needs: test-jvm
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: mandrel
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      - name: Build native CLI
        run: |
          ./mvnw package -pl operator-cli -am -Dnative -DskipTests \
            --batch-mode --no-transfer-progress \
            -Dquarkus.native.container-build=false
      - name: Rename binary
        run: |
          BINARY=$(find operator-cli/target -name "*-runner" -type f | head -1)
          cp "$BINARY" kubectl-microvm-linux-${{ matrix.arch }}
          chmod +x kubectl-microvm-linux-${{ matrix.arch }}
          file kubectl-microvm-linux-${{ matrix.arch }}
      - name: Smoke test
        run: timeout 5 ./kubectl-microvm-linux-${{ matrix.arch }} --help || true
      - uses: actions/upload-artifact@v4
        with:
          name: kubectl-microvm-linux-${{ matrix.arch }}
          path: kubectl-microvm-linux-${{ matrix.arch }}
          retention-days: 7

  # ─── Container images (per arch) ─────────────────────────────────────────
  # Builds native container images for operator + auth-agent per arch.

  container-image:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    needs: test-jvm
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: kube-microvm-operator
            dockerfile: Dockerfile
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: kube-microvm-operator
            dockerfile: Dockerfile
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: microvm-auth-agent
            dockerfile: Dockerfile.auth-agent
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: microvm-auth-agent
            dockerfile: Dockerfile.auth-agent
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  # ─── Multi-arch manifests ─────────────────────────────────────────────────

  manifest:
    name: Manifest (${{ matrix.image }})
    needs: container-image
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        image: [kube-microvm-operator, microvm-auth-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/${{ matrix.image }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            MAJOR="${VERSION%%.*}"; MINOR="${VERSION%.*}"
            TAGS="${IMAGE}:${VERSION} ${IMAGE}:${MINOR} ${IMAGE}:${MAJOR} ${IMAGE}:latest"
            SHA_TAG="${VERSION}"
          else
            SHA="${GITHUB_SHA::8}"
            TAGS="${IMAGE}:${SHA}"
            [[ "${GITHUB_REF}" == refs/heads/main ]] && TAGS="${TAGS} ${IMAGE}:main"
            SHA_TAG="${SHA}"
          fi
          AMD="${IMAGE}:${SHA_TAG}-amd64"
          ARM="${IMAGE}:${SHA_TAG}-arm64"
          # imagetools creates a proper multi-arch manifest from existing per-arch images
          # Works correctly even when per-arch tags are themselves manifest lists
          for TAG in ${TAGS}; do
            docker buildx imagetools create -t "${TAG}" "${AMD}" "${ARM}"
          done

  # ─── Helm chart ───────────────────────────────────────────────────────────

  helm-chart:
    name: Helm Chart
    needs: test-jvm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s/^version:.*/version: ${VERSION}/" charts/kube-microvm-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/kube-microvm-operator/Chart.yaml
          helm package charts/kube-microvm-operator --destination dist/
          helm push dist/kube-microvm-operator-${VERSION}.tgz oci://ghcr.io/${OWNER}/helm
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          retention-days: 1

  # ─── GitHub Release ───────────────────────────────────────────────────────

  release:
    name: GitHub Release
    needs: [native-cli, manifest, helm-chart]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kubectl-microvm-linux-amd64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: kubectl-microvm-linux-arm64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist/
      - name: Generate checksums
        working-directory: dist
        run: |
          # Individual .sha256 per artifact
          for f in kubectl-microvm-linux-amd64 kubectl-microvm-linux-arm64 kube-microvm-operator-*.tgz; do
            sha256sum "$f" > "$f.sha256"
          done
          # Combined checksums.sha256
          sha256sum kubectl-microvm-linux-amd64 kubectl-microvm-linux-arm64 kube-microvm-operator-*.tgz > checksums.sha256
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/kubectl-microvm-linux-amd64
            dist/kubectl-microvm-linux-amd64.sha256
            dist/kubectl-microvm-linux-arm64
            dist/kubectl-microvm-linux-arm64.sha256
            dist/kube-microvm-operator-*.tgz
            dist/kube-microvm-operator-*.tgz.sha256
            dist/checksums.sha256
