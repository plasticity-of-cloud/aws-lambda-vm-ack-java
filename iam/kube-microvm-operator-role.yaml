AWSTemplateFormatVersion: '2010-09-09'
Description: |
  KubeMicroVM Operator IAM Role — least-privilege access for managing
  AWS Lambda MicroVMs from an EKS cluster via Pod Identity.
  
  Deploy once per region. Multiple EKS clusters in the same region share
  this role by each creating a Pod Identity association pointing to it.
  MicroVM resources (images, VMs, network connectors) are regional — this
  role is scoped to the deployment region only.

Parameters:
  BuildRoleArn:
    Type: String
    Default: ''
    Description: >-
      ARN of the IAM role used by the MicroVM image build service.
      Required for iam:PassRole when creating MicroVM images.

Conditions:
  HasBuildRole: !Not [!Equals [!Ref BuildRoleArn, '']]

Resources:
  OperatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kube-microvm-operator
      Description: >-
        KubeMicroVM operator role — shared across EKS clusters in this account.
        Each cluster creates a Pod Identity association to this role.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: app
          Value: kube-microvm-operator

  MicroVMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: KubeMicroVMOperatorPolicy
      Description: Least-privilege policy for KubeMicroVM operator
      Roles:
        - !Ref OperatorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # All Lambda MicroVM operations.
          # NOTE: Resource must be '*' because the service uses varying resource ARNs
          # in its authorization context (e.g. GetMicrovm evaluates against microvm-image ARN,
          # Create actions evaluate against Resource:*). Region isolation is enforced by
          # deploying this stack per-region and the service only operating within its region.
          - Sid: LambdaMicroVMAllActions
            Effect: Allow
            Action:
              - lambda:RunMicrovm
              - lambda:GetMicrovm
              - lambda:ListMicrovms
              - lambda:SuspendMicrovm
              - lambda:ResumeMicrovm
              - lambda:TerminateMicrovm
              - lambda:CreateMicrovmAuthToken
              - lambda:CreateMicrovmShellAuthToken
              - lambda:CreateMicrovmImage
              - lambda:GetMicrovmImage
              - lambda:UpdateMicrovmImage
              - lambda:DeleteMicrovmImage
              - lambda:ListMicrovmImages
              - lambda:GetMicrovmImageVersion
              - lambda:ListMicrovmImageVersions
              - lambda:UpdateMicrovmImageVersion
              - lambda:DeleteMicrovmImageVersion
              - lambda:GetMicrovmImageBuild
              - lambda:ListMicrovmImageBuilds
              - lambda:ListManagedMicrovmImages
              - lambda:ListManagedMicrovmImageVersions
              - lambda:CreateNetworkConnector
              - lambda:GetNetworkConnector
              - lambda:UpdateNetworkConnector
              - lambda:DeleteNetworkConnector
              - lambda:ListNetworkConnectors
              - lambda:PassNetworkConnector
              - lambda:TagResource
              - lambda:UntagResource
              - lambda:ListTags
            Resource: '*'

          # STS for caller identity verification (health check)
          - Sid: Identity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'

  PassBuildRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: HasBuildRole
    Properties:
      ManagedPolicyName: KubeMicroVMPassBuildRole
      Description: Allows operator to pass the build role to MicroVM image service
      Roles:
        - !Ref OperatorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PassBuildRole
            Effect: Allow
            Action: iam:PassRole
            Resource: !Ref BuildRoleArn

  # EC2 + IAM permissions for network connector management
  NetworkConnectorPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: KubeMicroVMNetworkConnector
      Description: EC2 and IAM permissions required for Lambda network connector ENI management
      Roles:
        - !Ref OperatorRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2NetworkInterfaces
            Effect: Allow
            Action:
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:CreateNetworkInterface
              - ec2:DescribeNetworkInterfaces
              - ec2:DeleteNetworkInterface
            Resource: '*'
          - Sid: PassSelfForNetworkConnector
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt OperatorRole.Arn
          - Sid: LambdaServiceLinkedRole
            Effect: Allow
            Action: iam:CreateServiceLinkedRole
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/lambda.amazonaws.com/*'

Outputs:
  RoleArn:
    Description: >-
      IAM Role ARN — create a Pod Identity association per cluster:
      aws eks create-pod-identity-association --cluster-name <CLUSTER>
        --namespace kube-microvm --service-account kube-microvm-operator
        --role-arn <this ARN>
    Value: !GetAtt OperatorRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
