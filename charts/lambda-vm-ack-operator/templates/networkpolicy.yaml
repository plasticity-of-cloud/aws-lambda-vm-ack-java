apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lambda-vm-ack-operator.fullname" . }}
  labels:
    {{- include "lambda-vm-ack-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lambda-vm-ack-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Allow access to Kubernetes API server
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
