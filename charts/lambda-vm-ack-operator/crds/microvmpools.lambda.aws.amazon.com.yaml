apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: microvmpools.lambda.aws.amazon.com
spec:
  group: lambda.aws.amazon.com
  names:
    kind: MicroVMPool
    listKind: MicroVMPoolList
    plural: microvmpools
    singular: microvmpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["replicas"]
              properties:
                replicas:
                  type: integer
                  minimum: 0
                  maximum: 100
                template:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                minReady:
                  type: integer
                  default: 1
                maxSurge:
                  type: integer
                  default: 1
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                currentReplicas:
                  type: integer
                desiredReplicas:
                  type: integer
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
