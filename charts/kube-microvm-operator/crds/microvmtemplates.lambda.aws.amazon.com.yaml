apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: microvmtemplates.lambda.aws.amazon.com
spec:
  group: lambda.aws.amazon.com
  names:
    kind: MicroVMTemplate
    listKind: MicroVMTemplateList
    plural: microvmtemplates
    singular: microvmtemplate
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                runtime:
                  type: string
                  enum: ["java21", "python3.12", "nodejs20", "custom"]
                memoryMB:
                  type: integer
                  minimum: 128
                  maximum: 10240
                vcpus:
                  type: integer
                  minimum: 1
                  maximum: 6
                timeoutSeconds:
                  type: integer
                  minimum: 1
                  maximum: 900
                environment:
                  type: object
                  additionalProperties:
                    type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
