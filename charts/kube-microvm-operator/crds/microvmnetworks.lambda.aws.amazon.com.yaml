apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: microvmnetworks.lambda.aws.amazon.com
spec:
  group: lambda.aws.amazon.com
  names:
    kind: MicroVMNetwork
    listKind: MicroVMNetworkList
    plural: microvmnetworks
    singular: microvmnetwork
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["vpcId", "subnetIds", "securityGroupIds"]
              properties:
                vpcId:
                  type: string
                  pattern: "^vpc-[a-z0-9]+$"
                subnetIds:
                  type: array
                  minItems: 1
                  maxItems: 6
                  items:
                    type: string
                    pattern: "^subnet-[a-z0-9]+$"
                securityGroupIds:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    pattern: "^sg-[a-z0-9]+$"
