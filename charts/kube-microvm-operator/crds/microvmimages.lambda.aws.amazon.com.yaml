apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: microvmimages.lambda.aws.amazon.com
spec:
  group: lambda.aws.amazon.com
  names:
    kind: MicroVMImage
    listKind: MicroVMImageList
    plural: microvmimages
    singular: microvmimage
    shortNames:
      - mvmimg
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.imageState
        - name: VersionState
          type: string
          jsonPath: .status.latestVersionState
        - name: ARN
          type: string
          jsonPath: .status.imageArn
        - name: Version
          type: string
          jsonPath: .status.latestVersion
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                source:
                  type: object
                  required: [s3Bucket, s3Key]
                  properties:
                    s3Bucket:
                      type: string
                    s3Key:
                      type: string
                baseImageArn:
                  type: string
                buildRoleArn:
                  type: string
                buildTimeoutSeconds:
                  type: integer
                  minimum: 60
                  maximum: 3600
                autoActivate:
                  type: boolean
                  default: true
                region:
                  type: string
            status:
              type: object
              properties:
                imageArn:
                  type: string
                imageState:
                  type: string
                  enum: [CREATING, CREATED, CREATE_FAILED, UPDATING, UPDATED, UPDATE_FAILED, DELETING, DELETE_FAILED, DELETED]
                latestVersionState:
                  type: string
                  enum: [PENDING, IN_PROGRESS, SUCCESSFUL, FAILED, DELETE_FAILED]
                latestVersionStateReason:
                  type: string
                latestVersion:
                  type: string
                activeVersion:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                versions:
                  type: array
                  items:
                    type: object
                    properties:
                      version:
                        type: string
                      state:
                        type: string
                      startedAt:
                        type: string
                      builtAt:
                        type: string
                      failureReason:
                        type: string
