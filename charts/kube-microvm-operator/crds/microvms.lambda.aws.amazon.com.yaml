apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: microvms.lambda.aws.amazon.com
spec:
  group: lambda.aws.amazon.com
  names:
    kind: MicroVM
    listKind: MicroVMList
    plural: microvms
    singular: microvm
    shortNames:
      - mvm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: STATE
          type: string
          jsonPath: .status.state
        - name: VM-ID
          type: string
          jsonPath: .status.vmId
        - name: RUNTIME
          type: string
          jsonPath: .spec.runtime
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["runtime", "vcpus"]
              properties:
                vmId:
                  type: string
                runtime:
                  type: string
                  enum: ["java21", "python3.12", "nodejs20", "custom"]
                memoryMB:
                  type: integer
                  minimum: 128
                  maximum: 10240
                vcpus:
                  type: integer
                  minimum: 1
                  maximum: 6
                timeoutSeconds:
                  type: integer
                  minimum: 1
                  maximum: 900
                  default: 300
                networkRef:
                  type: string
                templateRef:
                  type: string
                desiredState:
                  type: string
                  enum: ["running", "paused", "stopped"]
                region:
                  type: string
                tags:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                state:
                  type: string
                vmId:
                  type: string
                ipAddress:
                  type: string
                lastTransitionTime:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
