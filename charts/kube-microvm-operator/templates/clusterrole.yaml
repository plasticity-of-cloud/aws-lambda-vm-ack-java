apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-microvm-operator.fullname" . }}
  labels:
    {{- include "kube-microvm-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["lambda.aws.amazon.com"]
    resources: ["microvms", "microvmpools", "microvmtemplates", "microvmnetworks", "microvmimages", "microvmclasses", "microvmreplicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["lambda.aws.amazon.com"]
    resources: ["microvms/status", "microvmpools/status", "microvmimages/status", "microvmreplicasets/status", "microvmnetworks/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["lambda.aws.amazon.com"]
    resources: ["microvms/finalizers", "microvmimages/finalizers", "microvmnetworks/finalizers"]
    verbs: ["update"]
  # Token sub-resource: required for MicroVMTokenResource endpoint
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch"]
