{{/*
ClusterRole granting `create` on `microvms/token` sub-resource.

Platform admins bind this role (or create a namespace-scoped Role with the same rules)
to service accounts that need to obtain MicroVM auth tokens.

Example RoleBinding (namespace-scoped, for a single MicroVM):

  kind: RoleBinding
  apiVersion: rbac.authorization.k8s.io/v1
  metadata:
    name: my-app-microvm-token
    namespace: my-app
  subjects:
  - kind: ServiceAccount
    name: my-app
    namespace: my-app
  roleRef:
    kind: ClusterRole
    name: microvm-token-requester
    apiGroup: rbac.authorization.k8s.io

To restrict to a specific MicroVM, use a namespace-scoped Role with resourceNames:

  rules:
  - apiGroups: ["lambda.aws.amazon.com"]
    resources: ["microvms/token"]
    resourceNames: ["my-specific-vm"]
    verbs: ["create"]
*/}}
{{- if .Values.tokenEndpoint.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: microvm-token-requester
  labels:
    {{- include "kube-microvm-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/chart: {{ include "kube-microvm-operator.chart" . }}
rules:
- apiGroups: ["lambda.aws.amazon.com"]
  resources: ["microvms/token"]
  verbs: ["create"]
{{- end }}
