apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-microvm-operator.fullname" . }}-webhook
  labels:
    {{- include "kube-microvm-operator.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
    {{- include "kube-microvm-operator.selectorLabels" . | nindent 4 }}
