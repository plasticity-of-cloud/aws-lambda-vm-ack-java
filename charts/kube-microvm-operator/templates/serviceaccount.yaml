{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-microvm-operator.serviceAccountName" . }}
  labels:
    {{- include "kube-microvm-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.aws.irsaRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.aws.irsaRoleArn | quote }}
  {{- end }}
{{- end }}
